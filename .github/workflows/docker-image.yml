name: Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional image version tag to publish, for example 0.2.0"
        required: false
        type: string
      latest:
        description: "Also publish/update the latest tag"
        required: false
        default: false
        type: boolean
      source_ref:
        description: "Optional git ref to build, for example wolf-hotkeyd-0.2.0"
        required: false
        type: string
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  docker:
    if: github.repository == 'I-am-PUID-0/wolf-hotkeyd'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lowercase image owner
        id: image
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.image.outputs.owner }}/wolf-steam-hotkeyd
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.latest }}
            type=match,pattern=^wolf-hotkeyd-(.*)$,group=1,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/steam-hotkeyd-image/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

name: Help request
description: Ask for help with wolf-hotkeyd setup, configuration, or troubleshooting.
title: "[HELP] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when you need help operating or troubleshooting wolf-hotkeyd.

        If you already have a clear defect with reproducible behavior, use the bug report template instead. For security issues, do not open a public issue.
  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Duplicate check
      options:
        - label: I searched existing issues and did not find the same question.
          required: true
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting, I have
      options:
        - label: Reviewed the README and relevant docs.
          required: true
        - label: Checked my configuration and environment for obvious mistakes.
          required: true
        - label: Re-tested on the latest applicable release, image tag, or branch head.
          required: true
        - label: Collected logs, screenshots, or commands that show the current state.
          required: true
        - label: Removed secrets, hostnames, account details, and local-only identifiers from pasted output.
          required: true
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      description: Describe the workflow, setup step, or outcome you are trying to achieve.
    validations:
      required: true
  - type: textarea
    id: blocked
    attributes:
      label: Where are you stuck?
      description: Explain what is failing, confusing, or unclear.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which area does this involve?
      multiple: false
      options:
        - Controller/input detection
        - Hotkey configuration
        - Action execution
        - Force-close process selection
        - Host-side mode
        - Steam runner image
        - Capture/debug scripts
        - Anti-cheat warning / runner choice
        - Other / unsure
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running wolf-hotkeyd?
      multiple: false
      options:
        - Custom Wolf Steam runner image
        - Manual copy inside Steam container
        - Host-side mode on Docker/Wolf host
        - Local source checkout
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: wolf-hotkeyd version / image tag / branch marker
      description: Include the exact version you are running.
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: host-os
    attributes:
      label: Host OS / platform
      description: Include your host OS and version.
      placeholder: Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      description: Include docs pages followed, config changes, commands run, or workarounds attempted.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste logs, error output, or command output that helps explain the current state. Remove secrets first.
      render: shell
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add screenshots, config snippets, or anything else that would help diagnose this faster.
    validations:
      required: false

name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Git whitespace check
        run: git diff-tree --check --no-commit-id --root -r HEAD

      - name: Compile Python
        run: python -m compileall wolf_hotkeyd

      - name: Load example configs
        run: |
          python - <<'PY'
          from pathlib import Path
          from wolf_hotkeyd.config import load_config

          for path in sorted(Path("examples").glob("*.yaml")):
              load_config(path, allow_missing=False)
              print(f"loaded {path}")
          PY

      - name: Shell syntax check
        run: bash -n actions/*.sh deploy/steam-hotkeyd-image/*.sh

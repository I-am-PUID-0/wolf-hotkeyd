poll_interval: 0.05
rescan_interval_seconds: 2.0

devices:
  include:
    - gamepad
  exclude: []

hotkeys:
  - name: force_close_game
    description: Force-close current Steam game and return to Big Picture
    buttons:
      - BTN_TL
      - BTN_TR
      - BTN_THUMBL
      - BTN_THUMBR
    hold_time_seconds: 2.0
    cooldown_seconds: 5.0
    action_timeout_seconds: 20.0
    action: /opt/wolf-hotkeyd/actions/force-close-game.sh
